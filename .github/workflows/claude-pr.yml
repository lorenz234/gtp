name: Claude Agent Task
 
on:
  workflow_dispatch:
    inputs:
      task:
        description: "Full prompt for Claude (assembled by ClaudeTask.to_prompt())"
        required: true
      pr_title:
        description: "Pull request title"
        required: true
      base_branch:
        description: "Branch to open the PR against"
        required: false
        default: "main"
      labels:
        description: "Comma-separated list of labels to apply to the PR"
        required: false
        default: "ai-assisted"
 
jobs:
  claude-task:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
 
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.base_branch }}
 
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
 
      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code
 
      - name: Create branch
        id: branch
        run: |
          BRANCH="claude/task-$(date +%s)"
          git checkout -b "$BRANCH"
          echo "branch=$BRANCH" >> $GITHUB_OUTPUT
 
      - name: Run Claude
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          claude -p "${{ github.event.inputs.task }}" \
            --allowedTools "Read,Write,Edit,Bash(git add *),Bash(git diff *),Bash(npm *),Bash(python *)" \
            --output-format json
 
      - name: Commit changes
        run: |
          git config user.name "growthepAI"
          git config user.email "AI@growthepie.com"
          git add -A
          # Only commit if there are actual changes
          git diff --staged --quiet || git commit -m "${{ github.event.inputs.pr_title }}"
 
      - name: Push branch
        run: git push origin ${{ steps.branch.outputs.branch }}
 
      - name: Open PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr create \
            --title "${{ github.event.inputs.pr_title }}" \
            --body "$(printf '> 🤖 Automated PR created by [growthepAI](https://github.com/growthepAI) via Claude Code.\n\n**Task prompt:**\n```\n${{ github.event.inputs.task }}\n```')" \
            --base ${{ github.event.inputs.base_branch }} \
            --head ${{ steps.branch.outputs.branch }} \
            --label ${{ github.event.inputs.labels }}