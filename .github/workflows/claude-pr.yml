name: Claude Agent Task
 
on:
  workflow_dispatch:
    inputs:
      task:
        description: "Full prompt for Claude (assembled by ClaudeTask.to_prompt())"
        required: true
      pr_title:
        description: "Pull request title"
        required: true
      base_branch:
        description: "Branch to open the PR against"
        required: false
        default: "main"
      labels:
        description: "Comma-separated list of labels to apply to the PR"
        required: false
        default: "ai-assisted"
 
jobs:
  claude-task:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
 
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.base_branch }}
 
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
 
      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code
 
      - name: Create branch
        id: branch
        run: |
          BRANCH="claude/task-$(date +%s)"
          git checkout -b "$BRANCH"
          echo "branch=$BRANCH" >> $GITHUB_OUTPUT
 
      - name: Run Claude
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DUNE_API_KEY: ${{ secrets.DUNE_API }}
          DISCORD_ALERTS: ${{ secrets.DISCORD_ALERTS }}
        run: |
          claude -p "${{ github.event.inputs.task }}" \
            --allowedTools "Read,Write,Edit,Bash(git add *),Bash(git diff *),Bash(npm *),Bash(python *)" \
            --output-format json > claude_output.json
 
      - name: Commit changes
        run: |
          git config user.name "growthepAI"
          git config user.email "AI@growthepie.com"
          git add -A
          # Only commit if there are actual changes
          git diff --staged --quiet || git commit -m "${{ github.event.inputs.pr_title }}"
 
      - name: Check for changes
        id: changes
        run: |
          if git log ${{ github.event.inputs.base_branch }}..${{ steps.branch.outputs.branch }} --oneline | grep -q .; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Push branch
        if: steps.changes.outputs.has_changes == 'true'
        run: git push origin ${{ steps.branch.outputs.branch }}

      - name: Open PR
        id: pr
        if: steps.changes.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_URL=$(gh pr create \
            --title "${{ github.event.inputs.pr_title }}" \
            --body "$(printf '> 🤖 Automated PR created by [growthepAI](https://github.com/growthepAI) via Claude Code.\n\n**Task prompt:**\n```\n${{ github.event.inputs.task }}\n```')" \
            --base ${{ github.event.inputs.base_branch }} \
            --head ${{ steps.branch.outputs.branch }})
          # Apply labels if provided, creating them if they don't exist
          if [ -n "${{ github.event.inputs.labels }}" ]; then
            IFS=',' read -ra LABELS <<< "${{ github.event.inputs.labels }}"
            for label in "${LABELS[@]}"; do
              label=$(echo "$label" | xargs)
              gh label create "$label" --force 2>/dev/null || true
              gh pr edit "$PR_URL" --add-label "$label"
            done
          fi
          echo "pr_url=$PR_URL" >> $GITHUB_OUTPUT

      - name: Comment on PR
        if: steps.changes.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ steps.pr.outputs.pr_url }}
        run: |
          COMMENT=$(jq -r '.result // "No summary available."' claude_output.json)
          gh pr comment "$PR_URL" --body "$(printf '### 🤖 What I changed and why\n\n%s' "$COMMENT")"

      - name: Notify Discord (PR created)
        if: steps.changes.outputs.has_changes == 'true'
        env:
          DISCORD_ALERTS: ${{ secrets.DISCORD_ALERTS }}
          PR_TITLE: ${{ github.event.inputs.pr_title }}
          PR_URL: ${{ steps.pr.outputs.pr_url }}
        run: |
          pip install requests -q
          python -c "
          import os, requests
          msg = '🤖 growthepAI opened a new PR: **{}**\n{}'.format(os.environ['PR_TITLE'], os.environ['PR_URL'])
          r = requests.post(os.environ['DISCORD_ALERTS'], json={'content': msg})
          print('Discord response:', r.status_code, r.text)
          r.raise_for_status()
          "

      - name: Notify Discord (no changes)
        if: steps.changes.outputs.has_changes == 'false'
        env:
          DISCORD_ALERTS: ${{ secrets.DISCORD_ALERTS }}
          PR_TITLE: ${{ github.event.inputs.pr_title }}
        run: |
          pip install requests -q
          python -c "
          import os, requests, json
          summary = 'No summary available.'
          try:
            with open('claude_output.json') as f:
              summary = json.load(f).get('result') or summary
          except Exception:
            pass
          msg = '⚠️ growthepAI found no changes to commit for task: **{}**\n\n**Claude summary:**\n{}'.format(os.environ['PR_TITLE'], summary)
          r = requests.post(os.environ['DISCORD_ALERTS'], json={'content': msg})
          print('Discord response:', r.status_code, r.text)
          r.raise_for_status()
          "