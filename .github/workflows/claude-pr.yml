name: Claude Agent Task
 
on:
  workflow_dispatch:
    inputs:
      task:
        description: "Full prompt for Claude (assembled by ClaudeTask.to_prompt())"
        required: true
      pr_title:
        description: "Pull request title"
        required: true
      base_branch:
        description: "Branch to open the PR against"
        required: false
        default: "main"
      labels:
        description: "Comma-separated list of labels to apply to the PR"
        required: false
        default: "ai-assisted"
 
jobs:
  claude-task:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
 
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.base_branch }}
 
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
 
      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code
 
      - name: Create branch
        id: branch
        run: |
          BRANCH="claude/task-$(date +%s)"
          git checkout -b "$BRANCH"
          echo "branch=$BRANCH" >> $GITHUB_OUTPUT
 
      - name: Run Claude
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DUNE_API_KEY: ${{ secrets.DUNE_API }}
          DISCORD_ALERTS: ${{ secrets.DISCORD_ALERTS }}
        run: |
          claude -p "${{ github.event.inputs.task }}" \
            --allowedTools "Read,Write,Edit,Bash(git add *),Bash(git diff *),Bash(npm *),Bash(python *)" \
            --output-format json
 
      - name: Commit changes
        run: |
          git config user.name "growthepAI"
          git config user.email "AI@growthepie.com"
          git add -A
          # Only commit if there are actual changes
          git diff --staged --quiet || git commit -m "${{ github.event.inputs.pr_title }}"
 
      - name: Push branch
        run: git push origin ${{ steps.branch.outputs.branch }}
 
      - name: Open PR
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_URL=$(gh pr create \
            --title "${{ github.event.inputs.pr_title }}" \
            --body "$(printf '> 🤖 Automated PR created by [growthepAI](https://github.com/growthepAI) via Claude Code.\n\n**Task prompt:**\n```\n${{ github.event.inputs.task }}\n```')" \
            --base ${{ github.event.inputs.base_branch }} \
            --head ${{ steps.branch.outputs.branch }})
          # Apply labels if provided, creating them if they don't exist
          if [ -n "${{ github.event.inputs.labels }}" ]; then
            IFS=',' read -ra LABELS <<< "${{ github.event.inputs.labels }}"
            for label in "${LABELS[@]}"; do
              label=$(echo "$label" | xargs)
              gh label create "$label" --force 2>/dev/null || true
              gh pr edit "$PR_URL" --add-label "$label"
            done
          fi
          echo "pr_url=$PR_URL" >> $GITHUB_OUTPUT

      - name: Notify Discord
        env:
          DISCORD_ALERTS: ${{ secrets.DISCORD_ALERTS }}
          PR_TITLE: ${{ github.event.inputs.pr_title }}
          PR_URL: ${{ steps.pr.outputs.pr_url }}
        run: |
          cd backend
          pip install requests -q
          export MSG=$(printf "🤖 growthepAI opened a new PR: **%s**\n%s" "$PR_TITLE" "$PR_URL")
          python -c "import sys,os; sys.path.insert(0,'.'); from src.misc.helper_functions import send_discord_message; send_discord_message(os.environ['MSG'])"